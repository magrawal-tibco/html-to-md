  - https://docs.tibco.com/ftp_portal/coveo/ibi-mdm-studio-6-1-0.xml
  - https://docs.tibco.com/ftp_portal/coveo/ibi-patterns-search-6-0-0.xml
  - https://docs.tibco.com/ftp_portal/coveo/ibi-patterns-search-6-1-0.xml
  - https://docs.tibco.com/ftp_portal/coveo/ibi-patterns-search-6-1-1.xml
  - https://docs.tibco.com/ftp_portal/coveo/tibco-mdm-9-3-2.xml
  - https://docs.tibco.com/ftp_portal/coveo/tibco-mdm-11-1-0.xml
